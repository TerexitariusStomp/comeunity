<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer EcoVillage Locations</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Volunteer EcoVillage Locations</h1>
    <p>Find eco-villages and regenerative communities open to volunteers.</p>
  </header>

  <main>
    <section class="panel">
      <h2>Locations</h2>
      <input id="search" type="text" placeholder="Search by name, country, or focus..." />
      <ul id="locationList"></ul>
    </section>
    <section class="panel map-wrap">
      <h2>Map</h2>
      <div id="map"></div>
    </section>
  </main>

  <footer>
    <small>Community-curated demo list. Verify availability before traveling.</small>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="script.js"></script>
</body>
</html>
