<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Jobs & Stays — Global Ecovillage Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #764ba2;
            --accent: #48bb78;
            --danger: #f56565;
            --warning: #ed8936;
            --bg: #f7fafc;
            --card: #ffffff;
            --text: #1a202c;
            --text-muted: #718096;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        /* Header */
        .site-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 48px 0 64px;
            position: relative;
            overflow: hidden;
        }
        .site-header::before {
            content: '';
            position: absolute;
            top: -50%; right: -10%;
            width: 500px; height: 500px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        .site-header h1 {
            font-size: 2.5rem; font-weight: 700; margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .site-header p {
            font-size: 1.1rem; opacity: 0.9; max-width: 560px;
        }
        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: rgba(255,255,255,0.85); text-decoration: none;
            font-size: 0.9rem; margin-bottom: 20px; transition: color 0.2s;
        }
        .back-link:hover { color: white; }

        /* Stats bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px; margin-top: -32px; position: relative; z-index: 2;
        }
        .stat-card {
            background: var(--card); border-radius: 16px;
            padding: 20px 16px; text-align: center;
            box-shadow: var(--shadow-lg); border: 1px solid var(--border);
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card .icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 10px; font-size: 1.1rem;
        }
        .stat-card.jobs .icon { background: #fee2e2; color: var(--danger); }
        .stat-card.stays .icon { background: #dbeafe; color: var(--primary); }
        .stat-card.orgs .icon { background: #d1fae5; color: var(--accent); }
        .stat-card .number { font-size: 1.5rem; font-weight: 700; }
        .stat-card .label { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

        /* Tabs */
        .tabs { display: flex; gap: 8px; margin: 32px 0 24px; }
        .tab {
            padding: 10px 24px; border-radius: 10px; cursor: pointer;
            font-weight: 500; font-size: 0.95rem; border: none;
            background: transparent; color: var(--text-muted);
            transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
        }
        .tab.active { background: white; color: var(--primary); box-shadow: var(--shadow); }
        .tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.5); }
        .tab .badge {
            background: var(--border); color: var(--text-muted);
            font-size: 0.7rem; padding: 2px 8px; border-radius: 20px;
            font-weight: 600;
        }
        .tab.active .badge { background: var(--primary); color: white; }

        /* Search */
        .search-box {
            display: flex; gap: 12px; margin-bottom: 24px;
        }
        .search-input {
            flex: 1; padding: 12px 18px; border-radius: 12px;
            border: 1px solid var(--border); font-size: 0.95rem;
            background: var(--card); outline: none; transition: box-shadow 0.2s, border-color 0.2s;
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
        .btn {
            padding: 12px 22px; border-radius: 12px; border: none;
            font-weight: 500; cursor: pointer; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg); }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .card {
            background: var(--card); border-radius: 16px;
            border: 1px solid var(--border); padding: 22px;
            box-shadow: var(--shadow); transition: all 0.2s;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .card-type {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
            padding: 4px 10px; border-radius: 20px;
        }
        .card-type.job { background: #fee2e2; color: #c53030; }
        .card-type.stay { background: #dbeafe; color: #2b6cb0; }
        .card-title { font-size: 1.15rem; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
        .card-org {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--primary); font-size: 0.85rem; font-weight: 500; margin-bottom: 12px;
        }
        .card-fields { margin-bottom: 12px; }
        .field-row {
            display: flex; gap: 8px; padding: 5px 0;
            font-size: 0.88rem;
        }
        .field-label {
            color: var(--text-muted); font-weight: 500; min-width: 80px;
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.03em;
            padding-top: 1px;
        }
        .field-value { color: var(--text); flex: 1; word-break: break-word; }
        .field-value.empty { color: var(--text-muted); opacity: 0.5; font-style: italic; }
        .card-desc {
            color: var(--text); font-size: 0.9rem; line-height: 1.55;
            margin-bottom: 14px; flex: 1;
            display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-footer { display: flex; gap: 10px; margin-top: auto; }
        .card-footer a, .card-footer button {
            flex: 1; text-align: center; padding: 8px 0; border-radius: 8px;
            font-size: 0.85rem; font-weight: 500; text-decoration: none; transition: all 0.2s;
            border: none; cursor: pointer; font-family: inherit;
        }
        .card-footer .btn-visit { background: var(--primary); color: white; }
        .card-footer .btn-visit:hover { background: var(--primary-dark); }
        .card-footer .btn-map {
            background: var(--bg); color: var(--text); border: 1px solid var(--border);
        }
        .card-footer .btn-map:hover { background: var(--border); }
        .card-footer .btn-details {
            background: var(--bg); color: var(--primary); border: 1px solid var(--primary);
        }
        .card-footer .btn-details:hover { background: var(--primary); color: white; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 1000;
            display: none; align-items: center; justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card); border-radius: 16px; max-width: 600px; width: 100%;
            max-height: 85vh; overflow-y: auto; padding: 32px;
            box-shadow: var(--shadow-lg);
        }
        .modal-close {
            float: right; cursor: pointer; color: var(--text-muted);
            font-size: 1.3rem; line-height: 1; border: none; background: none;
        }
        .modal-close:hover { color: var(--text); }
        .modal-type {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
            padding: 4px 10px; border-radius: 20px; display: inline-block; margin-bottom: 8px;
        }
        .modal-type.job { background: #fee2e2; color: #c53030; }
        .modal-type.stay { background: #dbeafe; color: #2b6cb0; }
        .modal-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
        .modal-org { color: var(--primary); font-size: 1rem; font-weight: 500; margin-bottom: 20px; }
        .modal-section { margin-bottom: 20px; }
        .modal-section-title {
            font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--text-muted); margin-bottom: 8px; padding-bottom: 6px;
            border-bottom: 2px solid var(--border);
        }
        .modal-fields .field-row { padding: 8px 0; }
        .modal-desc { color: var(--text); font-size: 0.92rem; line-height: 1.6; }
        .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
        .modal-actions a {
            flex: 1; text-align: center; padding: 10px 0; border-radius: 10px;
            font-size: 0.9rem; font-weight: 500; text-decoration: none; transition: all 0.2s;
        }

        /* Pagination */
        .pagination {
            display: flex; justify-content: center; align-items: center; gap: 12px;
            padding: 20px 0 40px;
        }
        .pagination button {
            padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--card); cursor: pointer; font-size: 0.85rem;
        }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .pagination .page-info { font-size: 0.85rem; color: var(--text-muted); }

        /* Loading / Empty */
        .loading { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .loading i { font-size: 2rem; animation: spin 1s linear infinite; color: var(--primary); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty i { font-size: 3rem; margin-bottom: 12px; opacity: 0.3; }

        /* Footer */
        .site-footer {
            text-align: center; padding: 32px 0; color: var(--text-muted);
            font-size: 0.85rem; border-top: 1px solid var(--border); margin-top: 20px;
        }

        @media (max-width: 640px) {
            .site-header h1 { font-size: 1.8rem; }
            .grid { grid-template-columns: 1fr; }
            .search-box { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Map</a>
            <h1>Volunteer Jobs & Stays</h1>
            <p>Browse volunteer opportunities and accommodation stays from ecovillages and intentional communities worldwide.</p>
        </div>
    </header>

    <main class="container">
        <div class="stats-bar" id="statsBar">
            <div class="stat-card jobs"><div class="icon"><i class="fas fa-briefcase"></i></div><div class="number" id="statJobs">—</div><div class="label">Job Listings</div></div>
            <div class="stat-card stays"><div class="icon"><i class="fas fa-bed"></i></div><div class="number" id="statStays">—</div><div class="label">Stay Offers</div></div>
            <div class="stat-card orgs"><div class="icon"><i class="fas fa-globe"></i></div><div class="number" id="statOrgs">—</div><div class="label">Organizations</div></div>
        </div>

        <div class="tabs" id="tabs">
            <button class="tab active" data-tab="jobs"><i class="fas fa-briefcase"></i> Jobs <span class="badge" id="badgeJobs">—</span></button>
            <button class="tab" data-tab="stays"><i class="fas fa-bed"></i> Stays <span class="badge" id="badgeStays">—</span></button>
        </div>

        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Search by title, role, country, organization...">
            <button class="btn btn-primary" id="searchBtn"><i class="fas fa-search"></i> Search</button>
            <button class="btn btn-secondary" id="clearBtn"><i class="fas fa-times"></i> Clear</button>
        </div>

        <div id="content">
            <div class="loading"><i class="fas fa-circle-notch"></i><p>Loading listings...</p></div>
        </div>

        <div class="pagination" id="pagination" style="display:none;">
            <button id="prevBtn"><i class="fas fa-chevron-left"></i> Prev</button>
            <span class="page-info" id="pageInfo">Page 1</span>
            <button id="nextBtn">Next <i class="fas fa-chevron-right"></i></button>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">Global Ecovillage Map — Open data for intentional communities.</div>
    </footer>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalBody"></div>
    </div>

    <script>
        const API_BASE = '';
        let currentTab = 'jobs';
        let currentPage = 0;
        const PAGE_SIZE = 24;
        let currentSearch = '';
        let allItems = [];

        // Stats
        async function loadStats() {
            try {
                const r = await fetch(`${API_BASE}/api/statistics/`);
                const d = await r.json();
                document.getElementById('statJobs').textContent = d.total_opportunities.toLocaleString();
                document.getElementById('statOrgs').textContent = d.total_organizations.toLocaleString();
                document.getElementById('statStays').textContent = (d.feature_counts?.has_stays || 0).toLocaleString();
                document.getElementById('badgeJobs').textContent = d.total_opportunities.toLocaleString();
            } catch(e) { console.error('stats', e); }
        }

        async function loadStayCount() {
            try {
                const stats = await (await fetch(`${API_BASE}/api/statistics/`)).json();
                document.getElementById('badgeStays').textContent = (stats.feature_counts?.has_stays || 0).toLocaleString();
            } catch(e) { console.error('stay count', e); }
        }

        // Content loading
        async function loadContent() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><i class="fas fa-circle-notch"></i><p>Loading listings...</p></div>';
            document.getElementById('pagination').style.display = 'none';

            const endpoint = currentTab === 'jobs' ? '/api/jobs-detailed/' : '/api/stays-detailed/';
            const url = `${API_BASE}${endpoint}?skip=${currentPage * PAGE_SIZE}&limit=${PAGE_SIZE}&search=${encodeURIComponent(currentSearch)}`;

            try {
                const r = await fetch(url);
                const data = await r.json();
                allItems = data;
                renderCards(data);
                updatePagination(data.length);
            } catch(e) {
                content.innerHTML = `<div class="empty"><i class="fas fa-exclamation-circle"></i><p>Error loading data. <a href="#" onclick="location.reload()">Retry</a></p></div>`;
            }
        }

        function getExchangeInfo(item) {
            const desc = (item.description || '').toLowerCase();
            const role = item.role || '';
            const parts = [];
            if (desc.includes('room') || desc.includes('accommodation') || desc.includes('lodging') || desc.includes('housing') || desc.includes('private room') || desc.includes('shared room')) parts.push('Room');
            if (desc.includes('food') || desc.includes('meals') || desc.includes('board') || desc.includes('kitchen') || desc.includes('catering')) parts.push('Food');
            if (desc.includes('stipend') || desc.includes('salary') || desc.includes('wage') || desc.includes('pocket money') || desc.includes('paid') || desc.includes('compensation') || desc.includes('cash')) parts.push('Cash');
            if (desc.includes('training') || desc.includes('course') || desc.includes('certification') || desc.includes('workshop')) parts.push('Training');
            if (desc.includes('certifi')) parts.push('Certificate');
            if (parts.length === 0) {
                if (role === 'paid_job') return 'Salary';
                if (role === 'volunteer' || role === 'volunteer/work') return 'Room & board';
                if (role === 'internship') return 'Room & board';
                if (role === 'apprenticeship') return 'Training & room';
                return '';
            }
            return parts.join(', ');
        }

        function cleanCommitment(c) {
            if (!c) return '';
            let s = c.trim();
            if (s.length > 60) s = s.substring(0, 57) + '...';
            return s;
        }

        function fieldRow(label, value, icon) {
            const hasValue = value && value !== 'None' && value !== 'null' && value !== '';
            if (!hasValue) return '';
            const iconHtml = icon ? `<i class="fas ${icon}"></i> ` : '';
            return `<div class="field-row"><span class="field-label">${iconHtml}${label}</span><span class="field-value">${esc(String(value))}</span></div>`;
        }

        function renderCards(items) {
            const content = document.getElementById('content');
            if (!items || items.length === 0) {
                content.innerHTML = `<div class="empty"><i class="fas fa-search"></i><h3>No results</h3><p>Try a different search term.</p></div>`;
                return;
            }

            const isJobs = currentTab === 'jobs';
            const html = `<div class="grid">` + items.map((item, idx) => {
                const org = item.organization;
                const typeLabel = isJobs ? 'Job' : 'Stay';
                const typeClass = isJobs ? 'job' : 'stay';

                const roleLabels = { 'volunteer': 'Volunteer', 'paid_job': 'Paid Position', 'internship': 'Internship', 'apprenticeship': 'Apprenticeship', 'volunteer/work': 'Volunteer / Work' };
                const roleLabel = roleLabels[item.role] || item.role || 'Unknown';

                let fields = '';
                if (isJobs) {
                    const locationStr = [org.city, org.country].filter(Boolean).join(', ');
                    const exchangeInfo = getExchangeInfo(item);
                    fields =
                        fieldRow('Type', roleLabel, 'fa-user-tag') +
                        fieldRow('Location', locationStr, 'fa-map-marker-alt');
                    if (exchangeInfo) fields += fieldRow('Offered', exchangeInfo, 'fa-hand-holding-heart');
                    if (item.commitment) fields += fieldRow('Commitment', cleanCommitment(item.commitment), 'fa-clock');
                    if (item.skills_needed) fields += fieldRow('Skills', item.skills_needed, 'fa-tools');
                    if (item.remote_options) fields += fieldRow('Remote', 'Yes', 'fa-wifi');
                    if (item.application_email) fields += fieldRow('Email', item.application_email, 'fa-envelope');
                } else {
                    const bookingLabels = { 'external_widget': 'External Booking Widget', 'calendar_tool': 'Calendar Tool', 'email_phone': 'Email / Phone', 'direct_form': 'Direct Form', 'unknown': 'Contact Directly' };
                    const bookingLabel = bookingLabels[item.booking_type] || item.booking_type || 'Contact Directly';
                    const stayTypeLabel = item.stay_type && item.stay_type !== 'accommodation' ? item.stay_type : null;
                    const stayLocation = [org.city, org.country].filter(Boolean).join(', ');
                    fields =
                        fieldRow('Booking', bookingLabel, 'fa-calendar-check');
                    if (stayTypeLabel) fields += fieldRow('Type', stayTypeLabel, 'fa-home');
                    if (item.price_info) fields += fieldRow('Price', item.price_info, 'fa-tag');
                    fields += fieldRow('Location', stayLocation, 'fa-map-marker-alt');
                }

                const website = isJobs ? (item.source_url || org.website || '#') : (item.booking_url || org.website || '#');
                const visitLabel = isJobs ? 'Apply' : 'Book';
                const mapUrl = org.latitude && org.longitude
                    ? `/?lat=${org.latitude}&lng=${org.longitude}&zoom=12`
                    : '/';

                return `
                <article class="card">
                    <div class="card-header">
                        <span class="card-type ${typeClass}">${typeLabel}</span>
                    </div>
                    <h3 class="card-title">${esc(item.title || 'Untitled')}</h3>
                    ${(item.title || '').toLowerCase().includes((org.name || '').toLowerCase()) ? '' : `<div class="card-org"><i class="fas fa-building"></i> ${esc(org.name || 'Unknown')}</div>`}
                    <div class="card-fields">${fields}</div>
                    <p class="card-desc">${esc(item.description || '').substring(0, 200)}${(item.description || '').length > 200 ? '...' : ''}</p>
                    <div class="card-footer">
                        <button class="btn-details" onclick="showDetail(${idx})"><i class="fas fa-info-circle"></i> Details</button>
                        <a href="${esc(website)}" target="_blank" rel="noopener" class="btn-visit"><i class="fas fa-external-link-alt"></i> ${visitLabel}</a>
                        <a href="${mapUrl}" class="btn-map"><i class="fas fa-map-marker-alt"></i> Map</a>
                    </div>
                </article>`;
            }).join('') + `</div>`;
            content.innerHTML = html;
        }

        function showDetail(idx) {
            const item = allItems[idx];
            if (!item) return;
            const org = item.organization;
            const isJobs = currentTab === 'jobs';
            const typeLabel = isJobs ? 'Job' : 'Stay';
            const typeClass = isJobs ? 'job' : 'stay';

            const roleLabels = { 'volunteer': 'Volunteer', 'paid_job': 'Paid Position', 'internship': 'Internship', 'apprenticeship': 'Apprenticeship', 'volunteer/work': 'Volunteer / Work' };
            const roleLabel = roleLabels[item.role] || item.role || 'Unknown';

            let fields = '';
            if (isJobs) {
                const locationStr = [org.city, org.country].filter(Boolean).join(', ');
                const exchangeInfo = getExchangeInfo(item);
                fields =
                    fieldRow('Type', roleLabel, 'fa-user-tag') +
                    fieldRow('Organization', org.name, 'fa-building') +
                    fieldRow('Location', locationStr, 'fa-map-marker-alt');
                if (exchangeInfo) fields += fieldRow("What's Offered", exchangeInfo, 'fa-hand-holding-heart');
                if (item.commitment) fields += fieldRow('Time Commitment', cleanCommitment(item.commitment), 'fa-clock');
                if (item.skills_needed) fields += fieldRow('Skills Needed', item.skills_needed, 'fa-tools');
                if (item.remote_options) fields += fieldRow('Remote Options', 'Yes — remote work available', 'fa-wifi');
                if (item.application_email) fields += fieldRow('Application Email', item.application_email, 'fa-envelope');
                if (item.start_date) fields += fieldRow('Start Date', new Date(item.start_date).toLocaleDateString(), 'fa-calendar');
                if (item.end_date) fields += fieldRow('End Date', new Date(item.end_date).toLocaleDateString(), 'fa-calendar');
                if (item.source_url) fields += fieldRow('Source Page', item.source_url, 'fa-link');
                fields += fieldRow('Website', org.website, 'fa-globe');
            } else {
                const bookingLabels = { 'external_widget': 'External Booking Widget', 'calendar_tool': 'Calendar Tool', 'email_phone': 'Email / Phone', 'direct_form': 'Direct Form', 'unknown': 'Contact Directly' };
                let bookingInfo = bookingLabels[item.booking_type] || item.booking_type || 'Contact Directly';
                if (item.booking_analysis) {
                    try {
                        const ba = typeof item.booking_analysis === 'string' ? JSON.parse(item.booking_analysis) : item.booking_analysis;
                        const parts = [];
                        if (ba.has_form) parts.push('booking form');
                        if (ba.has_iframe) parts.push('embedded widget');
                        if (ba.has_calendar) parts.push('calendar');
                        if (ba.has_email) parts.push('email');
                        if (ba.has_phone) parts.push('phone');
                        if (parts.length) bookingInfo = bookingInfo + ' (' + parts.join(', ') + ')';
                    } catch(e) {}
                }
                const stayTypeLabel = item.stay_type && item.stay_type !== 'accommodation' ? item.stay_type : null;
                fields =
                    fieldRow('Booking', bookingInfo, 'fa-calendar-check');
                if (stayTypeLabel) fields += fieldRow('Stay Type', stayTypeLabel, 'fa-home');
                if (item.price_info) fields += fieldRow('Price', item.price_info, 'fa-tag');
                fields +=
                    fieldRow('Booking Page', item.booking_url, 'fa-link') +
                    fieldRow('Organization', org.name, 'fa-building') +
                    fieldRow('Location', [org.city, org.country].filter(Boolean).join(', '), 'fa-map-marker-alt') +
                    fieldRow('Website', org.website, 'fa-globe');
            }

            const website = isJobs ? (item.source_url || org.website || '#') : (item.booking_url || org.website || '#');
            const visitLabel = isJobs ? 'Apply Now' : 'Book Now';
            const mapUrl = org.latitude && org.longitude
                ? `/?lat=${org.latitude}&lng=${org.longitude}&zoom=12`
                : '/';

            const desc = item.description ? esc(item.description) : '<span class="empty">No description available</span>';

            document.getElementById('modalBody').innerHTML = `
                <button class="modal-close" onclick="closeModal()">&times;</button>
                <span class="modal-type ${typeClass}">${typeLabel}</span>
                <h2 class="modal-title">${esc(item.title || 'Untitled')}</h2>
                <div class="modal-org"><i class="fas fa-building"></i> ${esc(org.name || 'Unknown')}</div>
                <div class="modal-section">
                    <div class="modal-section-title">Details</div>
                    <div class="modal-fields">${fields}</div>
                </div>
                <div class="modal-section">
                    <div class="modal-section-title">Description</div>
                    <p class="modal-desc">${desc}</p>
                </div>
                <div class="modal-actions">
                    <a href="${esc(website)}" target="_blank" rel="noopener" class="btn-visit"><i class="fas fa-external-link-alt"></i> ${visitLabel}</a>
                    <a href="${mapUrl}" class="btn-map"><i class="fas fa-map-marker-alt"></i> View on Map</a>
                </div>
            `;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        document.getElementById('modalOverlay').addEventListener('click', e => {
            if (e.target.id === 'modalOverlay') closeModal();
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
        });

        function updatePagination(count) {
            const pag = document.getElementById('pagination');
            const prev = document.getElementById('prevBtn');
            const next = document.getElementById('nextBtn');
            const info = document.getElementById('pageInfo');
            prev.disabled = currentPage === 0;
            next.disabled = count < PAGE_SIZE;
            info.textContent = `Page ${currentPage + 1}`;
            pag.style.display = 'flex';
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // Events
        document.getElementById('tabs').addEventListener('click', e => {
            const btn = e.target.closest('.tab');
            if (!btn) return;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            currentPage = 0;
            currentSearch = '';
            document.getElementById('searchInput').value = '';
            loadContent();
        });

        document.getElementById('searchBtn').addEventListener('click', () => {
            currentSearch = document.getElementById('searchInput').value.trim();
            currentPage = 0;
            loadContent();
        });

        document.getElementById('searchInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                currentSearch = e.target.value.trim();
                currentPage = 0;
                loadContent();
            }
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            currentSearch = '';
            currentPage = 0;
            loadContent();
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentPage > 0) { currentPage--; loadContent(); }
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentPage++; loadContent();
        });

        // Init
        loadStats();
        loadStayCount();
        loadContent();
    </script>
</body>
</html>
