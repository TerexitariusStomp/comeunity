<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Ecovillage Map - volunteer.templeearth.cc</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="map"></div>
    
    <div class="map-controls">
        <div class="control-panel">
            <div class="panel-header">
                <h3><i class="fas fa-globe-americas"></i> Ecovillage Map</h3>
                <button class="toggle-btn" id="filterToggle"><i class="fas fa-filter"></i></button>
            </div>
            
            <div class="panel-content" id="filterPanel">
                <!-- Feature Filters -->
                <div class="filter-group">
                    <label><input type="checkbox" class="feature-checkbox" data-feature="volunteer"> ❤️ Accepts Volunteers</label>
                    <label><input type="checkbox" class="feature-checkbox" data-feature="shortterm"> 👋 Accepts Short-term Visitors</label>
                    <label><input type="checkbox" class="feature-checkbox" data-feature="longterm"> 🏠 Accepts Long-term Residents</label>
                    <label><input type="checkbox" class="feature-checkbox" data-feature="jobs"> 💼 Has Jobs</label>
                </div>
                
                <!-- AI Search -->
                <div class="filter-group">
                    <label style="font-weight:600;margin-bottom:8px;display:block;">
                        <i class="fas fa-robot"></i> AI Search — describe what you want
                    </label>
                    <textarea id="semanticQuery" rows="3" placeholder="Describe what you're looking for... e.g., 'I'm a permaculture designer seeking a community that accepts volunteers for 3-6 months, with organic farming and natural building. Or mention a location: permaculture in Brazil, eco village in Europe'." style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:4px;font-size:14px;resize:vertical;margin-bottom:8px;"></textarea>
                    
                    <button id="semanticSearchBtn" class="btn btn-semantic">
                        <i class="fas fa-search"></i> Find Matching Locations
                    </button>
                    
                    <!-- Result count toast (shows briefly then auto-hides) -->
                    <div id="semanticToast" style="display:none;margin-top:8px;padding:6px 10px;border-radius:4px;background:#e8f5e9;color:#2e7d32;font-size:13px;text-align:center;"></div>
                </div>
                <div style="margin-top:8px;padding-top:8px;border-top:1px solid #eee;text-align:center;">
                    <a id="submitLink" href="#" style="font-size:12px;color:#888;text-decoration:none;" title="Add an ecovillage not yet on the map">
                        <i class="fas fa-plus-circle"></i> Submit an Ecovillage
                    </a>
                </div>
            </div>
        </div>
        
        <div class="stats-panel">
            <div class="stat-item">
                <span class="stat-label">Total Ecovillages</span>
                <span class="stat-value" id="totalOrgs">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Showing</span>
                <span class="stat-value" id="visibleCount">0</span>
            </div>
            <button id="resetBtn" class="btn btn-reset" title="Reset to all data" style="display:none;padding:4px 10px;font-size:12px;border:1px solid #ccc;border-radius:4px;background:#f8f9fa;cursor:pointer;white-space:nowrap;">
                <i class="fas fa-undo"></i> Reset
            </button>
        </div>
    </div>
    
    <div id="orgDetailsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-body"></div>
        </div>
    </div>
    
    <!-- Submit Ecovillage Modal -->
    <div id="submitModal" class="modal">
        <div class="modal-content" style="max-width:500px;">
            <span class="close-submit close-modal">&times;</span>
            <h3 style="margin:0 0 16px;"><i class="fas fa-plus-circle"></i> Submit an Ecovillage</h3>
            <form id="submitForm" style="display:flex;flex-direction:column;gap:10px;">
                <input type="text" id="subName" placeholder="Community name *" required style="padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px;">
                <textarea id="subDesc" rows="3" placeholder="Description (min 20 characters) *" required style="padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px;resize:vertical;"></textarea>
                <div style="display:flex;gap:8px;">
                    <input type="text" id="subCity" placeholder="City" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px;">
                    <input type="text" id="subCountry" placeholder="Country *" required style="flex:1;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px;">
                </div>
                <div style="display:flex;gap:8px;">
                    <input type="text" id="subWebsite" placeholder="Website URL" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px;">
                    <input type="email" id="subEmail" placeholder="Email" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px;">
                </div>
                <div style="display:flex;gap:8px;">
                    <input type="number" id="subLat" placeholder="Latitude *" step="any" required style="flex:1;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px;">
                    <input type="number" id="subLng" placeholder="Longitude *" step="any" required style="flex:1;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px;">
                </div>
                <div style="display:flex;flex-wrap:wrap;gap:8px;font-size:13px;">
                    <label><input type="checkbox" id="subVolunteers"> Accepts Volunteers</label>
                    <label><input type="checkbox" id="subVisitors"> Accepts Visitors</label>
                    <label><input type="checkbox" id="subShortterm"> Short-term</label>
                    <label><input type="checkbox" id="subLongterm"> Long-term</label>
                    <label><input type="checkbox" id="subJobs"> Has Jobs</label>
                </div>
                <div id="submitError" style="color:#c62828;font-size:13px;display:none;"></div>
                <button type="submit" id="submitBtn" style="padding:10px;background:#007bff;color:white;border:none;border-radius:4px;font-size:15px;cursor:pointer;">
                    <i class="fas fa-paper-plane"></i> Submit
                </button>
            </form>
        </div>
    </div>
    
    <div id="loadingIndicator" class="loading" style="display: none;">
        <div class="spinner"></div>
        <span>Loading ecovillages...</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
    <script src="js/app.js?v=22"></script>
    <!-- Analytics beacon -->
    <script>
    (function(){
        fetch('/api/track-view', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                path: window.location.pathname,
                referrer: document.referrer || '',
                sw: screen.width,
                sh: screen.height,
            }),
            // Fire-and-forget: no need to wait for response
            keepalive: true
        }).catch(function(){});
    })();
    </script>
</body>
</html>
